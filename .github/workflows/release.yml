name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Generate tauri.conf.json
        run: node src-tauri/scripts/generate-tauri-config.mjs
        env:
          NEXT_PUBLIC_PRODUCTION_API: ${{ secrets.NEXT_PUBLIC_PRODUCTION_API }}
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}

      - name: Build desktop
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'Ateliê ${{ github.ref_name }}'
          body: |
            Confira o [CHANGELOG.md](https://github.com/joaopedro08-dev/Atelie-Frontend/blob/master/CHANGELOG.md) para detalhes completos desta versão.

            ### Download

            | Instalador | Formato | Descrição |
            |---|---|---|
            | `Atelie-Admin_x64-setup.exe` | NSIS `.exe` | Recomendado para a maioria dos usuários |
            | `Atelie-Admin_x64_en-US.msi` | WiX `.msi` | Para ambientes corporativos ou Group Policy |

            > Usuários com versão anterior serão atualizados automaticamente.
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/nsis/latest.json
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/msi/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}